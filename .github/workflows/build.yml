name: CI
on: [push, pull_request]
jobs:
  macos:
    runs-on: macOS-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v1
      - name: Dependencies
        run: |
          brew install scons mingw-w64 zlib cppunit
          wget -qO /tmp/zlib.zip "https://downloads.sourceforge.net/project/libpng/zlib/1.2.8/zlib128-dll.zip?r=&ts=1403402496&use_mirror=hivelocity"
          mkdir /tmp/zlib
          unzip /tmp/zlib.zip -d /tmp/zlib
      - name: Build
        run: |
          scons ZLIB_W32=/tmp/zlib SKIPUTILS="NSIS Menu" NSIS_CONFIG_LOG=0 test dist-zip | tee build.log

  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v1
      - name: Dependencies
        run: |
          apt instll -y scons mingw32 mingw32-binutils zlib1g-dev libcppunit-dev
          wget -qO /tmp/zlib.zip "https://downloads.sourceforge.net/project/libpng/zlib/1.2.8/zlib128-dll.zip?r=&ts=1403402496&use_mirror=hivelocity"
          mkdir /tmp/zlib
          unzip /tmp/zlib.zip -d /tmp/zlib
      - name: Build
        run: |
          scons ZLIB_W32=/tmp/zlib SKIPUTILS="NSIS Menu" NSIS_CONFIG_LOG=0 test dist-zip | tee build.log
