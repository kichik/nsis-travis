name: CI
on: [push, pull_request]
jobs:
  build:
    strategy:
      matrix:
        #os: [ubuntu-18.04, macos-10.15, windows-2019]
        #log: [yes, no]
        os: [windows-2019]
        log: [no]
        include:
          - nightly: nightly
            os: windows-2019
            log: no
    
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v1
      - name: Brew Dependencies
        run: |
          brew install scons mingw-w64 zlib
          curl -sLo cppunit.rb "https://sourceforge.net/p/nsis/code/HEAD/tree/web-scripts/trunk/cppunit.rb?format=raw"
          brew install -s cppunit.rb
        if: startsWith(matrix.os, 'macos')
      - name: Apt Dependencies
        run: sudo DEBIAN_FRONTEND=noninteractive apt-get install -y scons g++-mingw-w64-i686 binutils-mingw-w64-i686 zlib1g-dev libcppunit-dev
        if: startsWith(matrix.os, 'ubuntu')
      - name: Setup Python
        uses: actions/setup-python@v1
        with:
          python-version: '3.8'
        if: startsWith(matrix.os, 'windows')
      - name: Choco Dependencies
        run: |
          curl -sLo cppunit-msvc-1.12.1.exe https://downloads.sourceforge.net/project/cppunit-msvc/cppunit-msvc-1.12.1.exe
          $arguments = "/S /D=$HOME\cppunit"
          Start-Process ./cppunit-msvc-1.12.1.exe $arguments -NoNewWindow -Wait
          pip install scons
          choco install html-help-workshop zip rsync
          echo "${Env:ProgramFiles(x86)}\HTML Help Workshop" >> $Env:GITHUB_PATH
        if: startsWith(matrix.os, 'windows')
      - name: Zlib Dependency
        run: |
          curl -sLo $HOME/zlib.zip "https://downloads.sourceforge.net/project/libpng/zlib/1.2.8/zlib128-dll.zip?r=&ts=1403402496&use_mirror=hivelocity"
          mkdir $HOME/zlib
          unzip $HOME/zlib.zip -d $HOME/zlib
      - name: Build
        run: |
          scons ZLIB_W32=$HOME/zlib SKIPUTILS="NSIS Menu" NSIS_CONFIG_LOG=${{ matrix.log }} test dist-zip
        if: "!startsWith(matrix.os, 'windows')"
      - name: Build (Windows)
        run: |
          scons ZLIB_W32=$HOME/zlib SKIPUTILS="NSIS Menu" NSIS_CONFIG_LOG=${{ matrix.log }} APPEND_CPPPATH=$HOME/cppunit/include APPEND_LIBPATH=$HOME/cppunit/lib/release-win32 test dist
        if: startsWith(matrix.os, 'windows')
      - name: Config Errors
        if: ${{ failure() }}
        run: cat config.log
      - name: Deploy
        run: |
          echo $Env:DEPLOY_KEY > $HOME/deploy_key
          Set-PSDebug -Trace 1
          rm nsis-*.zip
          scons ZLIB_W32=$HOME/zlib SKIPUTILS="NSIS Menu" DOCTYPES=web dist-zip
          echo https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID > build.log
          ls -Name nsis-*.zip -OutVariable zip
          zip $zip build.log
          mkdir nightly
          unzip $zip -d nightly
          ls -Name nightly/nsis-* -OutVariable LocalNightly
          $LocalNightly="nightly/$LocalNightly"
          $RemoteNightly="kichik,nsis@web.sourceforge.net:/home/project-web/nsis/htdocs/nightly"
          scp -oStrictHostKeyChecking=no -oBatchMode=yes -i $HOME/deploy_key $zip kichik,nsis@web.sourceforge.net:/home/project-web/nsis/htdocs/nightly/nsis.zip
          scp -oStrictHostKeyChecking=no -oBatchMode=yes -i $HOME/deploy_key build.log kichik,nsis@web.sourceforge.net:/home/project-web/nsis/htdocs/nightly/build.log
          echo "Options +indexes" > $LocalNightly/Docs/.htaccess
          echo "Options +indexes" > $LocalNightly/Examples/.htaccess
          echo "Options +indexes" > $LocalNightly/Include/.htaccess
          echo "Options +indexes" > $LocalNightly/Contrib/.htaccess
          rsync -e "ssh -oStrictHostKeyChecking=no -oBatchMode=yes" -vvvaW --delete $LocalNightly/Docs/ $RemoteNightly/Docs/
          rsync -e "ssh -oStrictHostKeyChecking=no -oBatchMode=yes" -vvvaW --delete $LocalNightly/Examples/ $RemoteNightly/Examples/
          rsync -e "ssh -oStrictHostKeyChecking=no -oBatchMode=yes" -vvvaW --delete $LocalNightly/Include/ $RemoteNightly/Include/
          rsync -e "ssh -oStrictHostKeyChecking=no -oBatchMode=yes" -vvvaW --delete $LocalNightly/Contrib/ $RemoteNightly/Contrib/
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        if: matrix.nightly == 'nightly' && github.ref == 'refs/heads/master'
      - name: Upload Artifact
        uses: actions/upload-artifact@v2
        with:
          name: build
          path: nsis-*.zip

  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: custom
        fields: workflow,job,commit,repo,ref,author,took
        custom_payload: |
          {
            username: 'action-slack',
            icon_emoji: ':octocat:',
            attachments: [{
              color: '${{ job.status }}' === 'success' ? 'good' : '${{ job.status }}' === 'failure' ? 'danger' : 'warning',
              text: `${process.env.AS_WORKFLOW}\n${process.env.AS_JOB} (${process.env.AS_COMMIT}) of ${process.env.AS_REPO}@${process.env.AS_REF} by ${process.env.AS_AUTHOR} succeeded in ${process.env.AS_TOOK}`,
            }]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
